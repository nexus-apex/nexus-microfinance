{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Borrower | NexusMFI{% endblock %}
{% block page_title %}{% if editing %}Edit Borrower{% else %}New Borrower{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Phone</label>
        <input type="text" name="phone" value="{{ record.phone|default:'' }}">
      </div>
    </div>
    <div class="form-group">
      <label>Address</label>
      <textarea name="address">{{ record.address|default:'' }}</textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Income</label>
        <input type="number" step="0.01" name="income" value="{{ record.income|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Credit Score</label>
        <input type="number" name="credit_score" value="{{ record.credit_score|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Active Loans</label>
        <input type="number" name="active_loans" value="{{ record.active_loans|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="blacklisted" {% if record.status == 'blacklisted' %}selected{% endif %}>Blacklisted</option>
          <option value="cleared" {% if record.status == 'cleared' %}selected{% endif %}>Cleared</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Id Number</label>
        <input type="text" name="id_number" value="{{ record.id_number|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Borrower</button>
      <a href="/borrowers/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
