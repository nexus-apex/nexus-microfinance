{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} LoanPayment | NexusMFI{% endblock %}
{% block page_title %}{% if editing %}Edit LoanPayment{% else %}New LoanPayment{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Loan Id</label>
        <input type="text" name="loan_id" value="{{ record.loan_id|default:'' }}">
      </div>
      <div class="form-group">
        <label>Borrower Name</label>
        <input type="text" name="borrower_name" value="{{ record.borrower_name|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ record.amount|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Payment Date</label>
        <input type="date" name="payment_date" value="{{ record.payment_date|date:'Y-m-d'|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Payment Method</label>
        <select name="payment_method">
          <option value="bank" {% if record.payment_method == 'bank' %}selected{% endif %}>Bank</option>
          <option value="cash" {% if record.payment_method == 'cash' %}selected{% endif %}>Cash</option>
          <option value="upi" {% if record.payment_method == 'upi' %}selected{% endif %}>UPI</option>
          <option value="auto_debit" {% if record.payment_method == 'auto_debit' %}selected{% endif %}>Auto Debit</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="paid" {% if record.status == 'paid' %}selected{% endif %}>Paid</option>
          <option value="overdue" {% if record.status == 'overdue' %}selected{% endif %}>Overdue</option>
          <option value="partial" {% if record.status == 'partial' %}selected{% endif %}>Partial</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Late Fee</label>
        <input type="number" step="0.01" name="late_fee" value="{{ record.late_fee|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Remaining Balance</label>
        <input type="number" step="0.01" name="remaining_balance" value="{{ record.remaining_balance|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} LoanPayment</button>
      <a href="/loanpayments/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
